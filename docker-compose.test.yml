version: "3.9"

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    container_name: my_genai_app_test
    env_file:
      - .env.example              # Usa valores de ejemplo para tests
    environment:
      - ENVIRONMENT=test
      - OPENAI_API_KEY=sk-test-fake-key
      - OPENWEATHER_API_KEY=fake-weather-key
    volumes:
      - ./tests:/app/tests
      - ./coverage.xml:/app/coverage.xml