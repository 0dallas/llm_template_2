name: CI — Test & Lint

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

# Cancelar runs previos si hay uno nuevo del mismo branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  # Variables de entorno de prueba (no son secretos reales)
  ENVIRONMENT: test
  OPENAI_API_KEY: sk-test-fake-key-for-ci
  OPENWEATHER_API_KEY: fake-weather-key-for-ci
  PORT: 8000

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Lint y Type Checking
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install -e ".[dev]"

      - name: Ejecutar Ruff (linter)
        run: ruff check src/ tests/

      - name: Ejecutar Ruff (formatter check)
        run: ruff format --check src/ tests/

      - name: Ejecutar MyPy (type checking)
        run: mypy src/

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Tests Unitarios
  # ─────────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Ejecutar tests unitarios
        run: |
          pytest tests/unit/ \
            -v \
            --cov=my_genai_app \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Tests de Integración
  # ─────────────────────────────────────────────────────────────────
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Ejecutar tests de integración
        run: |
          pytest tests/integration/ \
            -v \
            --cov=my_genai_app \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml

  # ─────────────────────────────────────────────────────────────────
  # Job 4: Build Docker (verifica que el Dockerfile no tiene errores)
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen de producción (sin push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: false
          tags: my_genai_app:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build imagen de test (sin push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: test
          push: false
          tags: my_genai_app:test-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # Job 5: Coverage Report en PRs
  # ─────────────────────────────────────────────────────────────────
  coverage-report:
    name: 📊 Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar reporte unit
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Descargar reporte integration
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Comentar coverage en PR
        uses: codecov/codecov-action@v4
        with:
          files: coverage-unit.xml,coverage-integration.xml
          fail_ci_if_error: false
          verbose: true