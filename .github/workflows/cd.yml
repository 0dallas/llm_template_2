name: CD — Build & Deploy

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]   # También se dispara con tags de versión: v1.0.0

  # Permite disparar manualmente desde GitHub Actions
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno de despliegue"
        required: true
        default: "staging"
        type: choice
        options: ["staging", "production"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # NO cancelar deploys en curso

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Determinar entorno y versión
  # ─────────────────────────────────────────────────────────────────
  setup:
    name: ⚙️ Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Determinar entorno
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else:
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determinar tag de imagen
        id: set-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "image_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Build y Push de imagen Docker
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      full_image_tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.image_tag }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build y Push imagen de producción
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.setup.outputs.image_tag }}

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Deploy a Staging
  # ─────────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    if: needs.setup.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.my-genai-app.example.com

    steps:
      - name: Deploy a Staging
        run: |
          echo "🚀 Desplegando imagen: ${{ needs.build-and-push.outputs.full_image_tag }}"
          echo "📋 Digest: ${{ needs.build-and-push.outputs.image_digest }}"
          # Aquí va tu lógica de deploy:
          # - kubectl set image deployment/my-genai-app ...
          # - helm upgrade --install ...
          # - docker compose pull && docker compose up -d
          # - aws ecs update-service ...
          echo "✅ Deploy a staging completado"

  # ─────────────────────────────────────────────────────────────────
  # Job 4: Deploy a Production (solo con tags)
  # ─────────────────────────────────────────────────────────────────
  deploy-production:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    if: needs.setup.outputs.environment == 'production'
    environment:
      name: production
      url: https://my-genai-app.example.com

    steps:
      - name: Deploy a Production
        run: |
          echo "🏭 Desplegando en PRODUCCIÓN: ${{ needs.build-and-push.outputs.full_image_tag }}"
          echo "✅ Deploy a producción completado"

  # ─────────────────────────────────────────────────────────────────
  # Job 5: Notificación de resultado
  # ─────────────────────────────────────────────────────────────────
  notify:
    name: 📢 Notificar resultado
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Notificación de éxito o fallo
        run: |
          if [[ "${{ needs.deploy-staging.result }}" == "success" || "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "✅ Deploy exitoso"
          else
            echo "❌ Deploy fallido"
            exit 1
          fi